name: Job Hunter

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

concurrency:
  group: job-hunter
  cancel-in-progress: false   # let a running job finish before starting next

permissions:
  contents: write             # needed to commit seen_jobs.json back

jobs:
  hunt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run job hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY:     ${{ secrets.ADZUNA_API_KEY }}
          JOOBLE_API_KEY:     ${{ secrets.JOOBLE_API_KEY }}
          FINDWORK_API_KEY:   ${{ secrets.FINDWORK_API_KEY }}
        run: python job_hunter.py --once

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet && echo "no changes" || \
            git commit -m "chore: update seen_jobs [skip ci]" && git push
